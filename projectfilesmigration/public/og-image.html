<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Coast Kink Events - OG Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            width: 1200px;
            height: 630px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            color: white;
            position: relative;
            z-index: 2;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-family: serif;
            font-weight: bold;
            font-size: 48px;
            color: white;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .title {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #e5e7eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 28px;
            font-weight: 400;
            color: #9ca3af;
            margin-bottom: 40px;
            max-width: 800px;
            line-height: 1.4;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #d1d5db;
            font-size: 18px;
            font-weight: 500;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            background: #8b5cf6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: 1;
        }
        
        .accent-line {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent 0%, #8b5cf6 50%, transparent 100%);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    <div class="container">
        <div class="logo">EC</div>
        <h1 class="title">East Coast Kink Events</h1>
        <p class="subtitle">Discover BDSM Events & Dungeons Across the East Coast</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <span>Events</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🏛️</div>
                <span>Dungeons</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <span>Education</span>
            </div>
        </div>
    </div>
    <div class="accent-line"></div>
</body>
</html>
